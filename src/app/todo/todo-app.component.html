<section class="todo-app">
    <app-todo-header [today]="today" [totalTasks]="totalTasks()" [visibleTasks]="filteredTodos().length" />

    <app-todo-create-form (addTodo)="addTodo($event)" />

    <app-todo-filter-bar [activeFilter]="activeFilter()" [searchTerm]="searchTerm()" (filterChange)="setFilter($event)"
        (markAllDone)="setFilterAllDone()" (markAllOpen)="setFilterNoneDone()" (clearAll)="deleteAllTodos()"
        (clearDone)="deleteAllDoneTodos()" (searchTermChange)="setSearchTerm($event)" />

    <app-todo-list [todos]="filteredTodos()" [editingId]="editingId()" [editDraft]="editDraft()"
        (toggleDone)="toggleTodoDone($event)" (startEdit)="startEdit($event)" (editDraftChange)="editDraft.set($event)"
        (saveEdit)="saveEdit($event)" (cancelEdit)="cancelEdit()" (deleteTodo)="deleteTodo($event)" />

    <app-todo-progress [doneTasks]="doneTasks()" [totalTasks]="totalTasks()" [progressPercent]="progressPercent()" />
</section>
